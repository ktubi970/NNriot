<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tracking — NNriot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #070b12;
      --surface:   #0f1620;
      --surface2:  #141e2e;
      --border:    rgba(255,255,255,0.07);
      --accent:    #00ff88;
      --accent2:   #00c8ff;
      --blue:      #3d7eff;
      --red:       #ff4d6d;
      --gold:      #ffc93c;
      --text:      #e8edf5;
      --muted:     #6b7a96;
      --glow:      rgba(0,255,136,0.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1,h2,h3,h4 { font-family: 'Outfit', sans-serif; }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky; top: 0; z-index: 999;
      background: rgba(7,11,18,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem; font-weight: 900;
      color: #fff; text-decoration: none;
      display: flex; align-items: center; gap: 4px;
    }
    .nav-logo em { color: var(--accent); font-style: normal; }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-link {
      color: var(--muted); text-decoration: none;
      font-size: 0.9rem; font-weight: 600;
      transition: color 0.2s;
      position: relative; padding-bottom: 2px;
    }
    .nav-link:hover { color: #fff; }
    .nav-link.active { color: var(--accent); }
    .nav-link.active::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 2px; background: var(--accent); border-radius: 2px;
    }
    .nav-cta {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #070b12; font-family: 'Outfit', sans-serif;
      font-weight: 800; font-size: 0.85rem;
      padding: 8px 20px; border-radius: 8px;
      text-decoration: none; letter-spacing: 0.5px;
      box-shadow: 0 0 20px var(--glow);
    }

    /* ── HEADER ── */
    .header {
      padding: 60px 24px 40px;
      text-align: center;
      max-width: 1200px; margin: 0 auto;
    }
    .header h1 {
      font-size: 3rem; font-weight: 900; margin-bottom: 12px;
      background: linear-gradient(135deg, #fff, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { color: var(--muted); font-size: 1.1rem; }

    /* ── SEARCH AREA ── */
    .search-section {
      max-width: 800px; margin: 0 auto 60px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    .search-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .search-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); box-shadow: 0 0 8px var(--blue); }
    
    .search-form { display: flex; gap: 12px; }
    .input-group { position: relative; flex: 1; }
    .search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 20px; color: #fff;
      font-family: inherit; font-size: 1rem; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); outline: none; }
    .search-input::placeholder { color: var(--muted); }
    
    .select-region {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 0 16px; color: #fff;
      font-family: inherit; font-size: 0.9rem; cursor: pointer;
    }

    .btn-search {
      background: var(--blue); color: #fff; border: none;
      border-radius: 12px; padding: 0 24px; font-weight: 700;
      cursor: pointer; transition: transform 0.2s, opacity 0.2s;
    }
    .btn-search:hover { transform: translateY(-2px); opacity: 0.9; }

    /* ── ACTIVE GAME RESULT ── */
    #active-result { margin-top: 32px; display: none; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .active-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
    }
    .active-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 16px;}
    .active-info { display: flex; flex-direction: column; gap: 4px; }
    .game-mode-tag { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    .game-time { font-family: monospace; color: var(--muted); font-size: 0.9rem; }
    
    .team-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .team-header { font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; }
    .team-blue { color: var(--blue); }
    .team-red { color: var(--red); }
    
    .participant-list { display: flex; flex-direction: column; gap: 8px; }
    .participant {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color 0.2s;
    }
    .participant:hover { border-color: rgba(255,255,255,0.15); }
    .champ-icon-small {
      width: 32px; height: 32px; border-radius: 6px; background: #000;
    }
    .p-name { font-size: 0.85rem; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .p-stats { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
    .p-stats em { font-style: normal; color: var(--accent); }

    .btn-predict-live {
      margin-top: 24px; width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; border: none; border-radius: 12px;
      font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1rem;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-predict-live:hover { transform: translateY(-3px); box-shadow: 0 0 30px var(--glow); }

    /* ── FEATURED GAMES ── */
    .featured-section { max-width: 1200px; margin: 0 auto 80px; padding: 0 24px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .section-title { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 12px; }
    .section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    
    .featured-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 24px; }
    .featured-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px;
      transition: transform 0.25s, border-color 0.25s;
      cursor: pointer;
    }
    .featured-card:hover { transform: translateY(-6px); border-color: rgba(61,126,255,0.3); }
    
    .f-header { display: flex; justify-content: space-between; margin-bottom: 16px; font-size: 0.75rem; font-weight: 700; color: var(--muted); }
    .f-teams { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .f-team-list { display: flex; flex-direction: column; gap: 6px; }
    .f-player { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
    .f-champ { width: 20px; height: 20px; border-radius: 4px; background: #000; }
    
    .f-footer { border-top: 1px solid var(--border); padding-top: 16px; display: flex; justify-content: space-between; align-items: center; }
    .f-action { color: var(--accent); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── SKELETON ── */
    .skel {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite;
      border-radius: 8px; color: transparent !important;
    }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

    /* ── RESPONSIVE ── */
    @media (max-width: 800px) {
      .team-grid { grid-template-columns: 1fr; gap: 24px; }
      .search-form { flex-direction: column; }
      .select-region { height: 50px; }
      .featured-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="/" class="nav-logo">NN<em>RIOT</em></a>
  <div class="nav-links">
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/explorer" class="nav-link">Explorer</a>
    <a href="/predictor" class="nav-link">Predictor</a>
    <a href="/live" class="nav-link active">Live</a>
    <a href="/smurfs" class="nav-link">Smurfs</a>
    <a href="/monitor" class="nav-link">Monitor</a>
    <a href="/predictor" class="nav-cta">⚡ Predict</a>
  </div>
</nav>

<header class="header">
  <h1>Live Tracking</h1>
  <p>Track high-elo featured matches or follow any player in real-time.</p>
</header>

<!-- TRACKER SEARCH -->
<section class="section" style="max-width: 1200px; margin: 0 auto; padding: 0 24px;">
  <div class="search-section">
    <div class="search-title"><span class="dot"></span> Real-time Track</div>
    <form class="search-form" id="search-form">
      <div class="input-group">
        <input type="text" id="p-name" class="search-input" placeholder="Summoner Name (e.g. Hide on bush)" required>
      </div>
      <div class="input-group" style="max-width: 120px;">
        <input type="text" id="p-tag" class="search-input" placeholder="#KR1" required>
      </div>
      <select id="p-region" class="select-region">
        <option value="EUW">Europe West</option>
        <option value="KR" selected>Korea</option>
        <option value="NA">North America</option>
        <option value="EUN">Europe NE</option>
        <option value="BR">Brazil</option>
        <option value="JP1">Japan</option>
        <option value="LA1">LAN</option>
        <option value="LA2">LAS</option>
        <option value="OC1">Oceania</option>
        <option value="RU">Russia</option>
        <option value="TR1">Turkey</option>
      </select>
      <button type="submit" class="btn-search">Search</button>
    </form>

    <div id="active-result">
      <div class="active-card">
        <div class="active-header">
          <div class="active-info">
            <span class="game-mode-tag" id="game-mode">RANKED SOLO 5X5</span>
            <div style="font-size:1.1rem; font-weight:800;" id="game-display-name">Loading Game...</div>
          </div>
          <div class="game-time" id="game-timer">00:00</div>
        </div>

        <div class="team-grid">
          <div>
            <div class="team-header team-blue">Blue Team</div>
            <div class="participant-list" id="blue-list">
              <!-- JS -->
            </div>
          </div>
          <div>
            <div class="team-header team-red">Red Team</div>
            <div class="participant-list" id="red-list">
              <!-- JS -->
            </div>
          </div>
        </div>

        <button class="btn-predict-live" id="btn-predict-now">⚡ Predict Outcome for this Match</button>
      </div>
    </div>
    
    <div id="search-error" style="display:none; color:var(--red); text-align:center; margin-top:20px; font-weight:600;"></div>
    <div id="search-loading" style="display:none; text-align:center; margin-top:20px; color:var(--muted);">
      Searching Riot API...
    </div>
  </div>
</section>

<!-- FEATURED GAMES -->
<section class="featured-section">
  <div class="section-header">
    <div class="section-title"><span class="dot"></span> Featured Games</div>
    <div style="display:flex; gap:10px;">
        <select id="featured-region" class="select-region" style="height:38px; font-size:0.8rem; padding:0 12px;">
            <option value="EUW">EUW</option>
            <option value="KR" selected>Korea</option>
            <option value="NA">NA</option>
            <option value="EUN">EUN</option>
            <option value="BR">BR</option>
        </select>
        <button id="refresh-featured" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem;">↺ Refresh</button>
    </div>
  </div>

  <div class="featured-grid" id="featured-grid">
    <!-- skeletons -->
    <div class="featured-card skel"></div>
    <div class="featured-card skel"></div>
    <div class="featured-card skel"></div>
  </div>
</section>

<script>
  let currentActiveGame = null;
  let activeRegion = 'KR';

  // Format time
  function fmtTimer(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  }

  // Guess region based on timezone
  function guessRegion() {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    if (tz.includes('Seoul') || tz.includes('Tokyo')) return 'KR';
    if (tz.includes('Europe/London') || tz.includes('Europe/Paris') || tz.includes('Europe/Berlin') || tz.includes('Europe/Madrid')) return 'EUW';
    if (tz.includes('America')) return 'NA';
    return 'EUW'; // Default
  }

  // Load Featured
  async function loadFeatured(region) {
    const grid = document.getElementById('featured-grid');
    grid.innerHTML = '<div class="featured-card skel"></div>'.repeat(3);
    
    try {
      const res = await fetch(`/api/spectator/featured?region=${region}`);
      const data = await res.json();
      
      if (!data.success || !data.games.length) {
        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--muted); padding:40px;">No featured games found for this region.</div>';
        return;
      }

      grid.innerHTML = data.games.map(g => {
        const blue = g.participants.filter(p => p.teamId === 100);
        const red = g.participants.filter(p => p.teamId === 200);
        
        const renderPlayers = players => players.map(p => `
          <div class="f-player">
            <img class="f-champ" src="https://ddragon.leagueoflegends.com/cdn/14.6.1/img/champion/${p.championName||'Aatrox'}.png" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/14.6.1/img/champion/Aatrox.png'">
            <span>${p.summonerName}</span>
          </div>
        `).join('');

        return `
          <div class="featured-card" onclick="trackPlayer('${g.participants[0].summonerName}', '', '${region}')">
            <div class="f-header">
              <span>${g.gameMode}</span>
              <span>ID: ${g.gameId.toString().slice(-8)}</span>
            </div>
            <div class="f-teams">
              <div class="f-team-list">${renderPlayers(blue)}</div>
              <div class="f-team-list">${renderPlayers(red)}</div>
            </div>
            <div class="f-footer">
              <span class="f-action">Track Game →</span>
              <span style="font-size:0.7rem; color:var(--muted)">High MMR Match</span>
            </div>
          </div>
        `;
      }).join('');
    } catch(e) { console.error(e); grid.innerHTML = 'Error loading featured games.'; }
  }

  // Search Logic
  async function trackPlayer(name, tag, region) {
    const resultDiv = document.getElementById('active-result');
    const loading = document.getElementById('search-loading');
    const error = document.getElementById('search-error');
    
    resultDiv.style.display = 'none';
    loading.style.display = 'block';
    error.style.display = 'none';

    // Handle tag if missing
    if (!tag) {
        if (region === 'KR') tag = 'KR1';
        else if (region === 'EUW') tag = 'EUW1';
        else if (region === 'NA') tag = 'NA1';
        else tag = region;
    }
    if (tag && !tag.startsWith('#')) tag = '#' + tag;

    try {
      const res = await fetch(`/api/spectator/active?name=${encodeURIComponent(name)}&tag=${encodeURIComponent(tag.replace('#',''))}`);
      const data = await res.json();
      
      loading.style.display = 'none';
      if (!data.success) {
        error.textContent = data.error;
        error.style.display = 'block';
        return;
      }

      currentActiveGame = data.game;
      activeRegion = region;
      
      document.getElementById('game-mode').textContent = data.game.gameMode;
      document.getElementById('game-display-name').textContent = `${name}${tag}`;
      
      const blue = data.game.participants.filter(p => p.teamId === 100);
      const red = data.game.participants.filter(p => p.teamId === 200);
      
      const renderList = (participants, target) => {
        document.getElementById(target).innerHTML = participants.map(p => {
          const stats = p.stats || {};
          const kdaText = stats.avg_kda ? `KDA: <em>${stats.avg_kda.toFixed(2)}</em>` : 'No data in DB';
          return `
            <div class="participant">
              <img class="champ-icon-small" src="https://ddragon.leagueoflegends.com/cdn/14.6.1/img/champion/${p.championName||'Aatrox'}.png" onerror="this.src='https://ddragon.leagueoflegends.com/cdn/14.6.1/img/champion/Aatrox.png'">
              <div class="p-name">${p.summonerName}</div>
              <div class="p-stats">${kdaText}</div>
            </div>
          `;
        }).join('');
      };

      renderList(blue, 'blue-list');
      renderList(red, 'red-list');
      
      resultDiv.style.display = 'block';
    } catch(e) { 
        loading.style.display = 'none';
        error.textContent = 'Network error or server down.';
        error.style.display = 'block';
    }
  }

  // Mount
  document.addEventListener('DOMContentLoaded', () => {
    const defRegion = guessRegion();
    document.getElementById('p-region').value = defRegion;
    document.getElementById('featured-region').value = defRegion;
    loadFeatured(defRegion);
    
    document.getElementById('search-form').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('p-name').value;
      const tag = document.getElementById('p-tag').value;
      const region = document.getElementById('p-region').value;
      trackPlayer(name, tag, region);
    });

    document.getElementById('refresh-featured').addEventListener('click', () => {
      loadFeatured(document.getElementById('featured-region').value);
    });

    document.getElementById('featured-region').addEventListener('change', e => {
      loadFeatured(e.target.value);
    });

    document.getElementById('btn-predict-now').addEventListener('click', () => {
      if (!currentActiveGame) return;
      // Pass data to predictor via sessionStorage
      sessionStorage.setItem('live_match_data', JSON.stringify(currentActiveGame));
      sessionStorage.setItem('live_match_region', activeRegion);
      window.location.href = '/predictor';
    });
  });
</script>

</body>
</html>
